<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KCode</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/style-additions.css">
<link rel="stylesheet" href="css/themes.css">
<!-- Codicons: la fuente de íconos REAL de Visual Studio Code -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.45/dist/codicon.css" id="app-codicon-link">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">
</head>
<body data-theme="dark-2026">

<div id="app">

  <nav class="activity-bar" id="activity-bar">
    <button class="activity-btn active" data-view="explorer" title="Explorador (Ctrl+Shift+E)">
      <i class="codicon codicon-files"></i>
    </button>
    <button class="activity-btn" data-view="search" title="Buscar (Ctrl+Shift+F)">
      <i class="codicon codicon-search"></i>
    </button>
    <div class="activity-spacer"></div>
    <button class="activity-btn" id="btn-settings" title="Configuración">
      <i class="codicon codicon-settings-gear"></i>
    </button>
  </nav>

  <aside class="side-bar" id="side-bar">
    <div class="sidebar-view" id="view-explorer">
      <div class="side-bar-header">
        <span>Explorador</span>
        <div class="side-bar-actions">
          <button id="btn-new-file" title="Nuevo archivo">
            <i class="codicon codicon-new-file"></i>
          </button>
          <button id="btn-new-folder" title="Nueva carpeta">
            <i class="codicon codicon-new-folder"></i>
          </button>
          <button id="btn-open-folder" title="Abrir carpeta">
            <i class="codicon codicon-folder-opened"></i>
          </button>
        </div>
      </div>

      <div class="side-bar-content">
        <div id="no-folder-message" class="no-folder-message">
          <p>No has abierto ninguna carpeta.</p>
          <button id="btn-open-folder-main" class="btn-primary">Abrir carpeta</button>
          <button id="btn-reopen-last" class="btn-secondary" style="display:none;">Reabrir última carpeta</button>
          <button id="btn-virtual-fs" class="btn-link">Usar sistema de archivos virtual</button>
        </div>
        <div id="explorer-root" class="explorer-root" style="display:none;"></div>
      </div>
    </div>

    <div class="sidebar-view" id="view-search" style="display:none;">
      <div class="side-bar-header">
        <span>Búsqueda</span>
      </div>
      <div class="side-bar-content search-content">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" placeholder="Buscar en los archivos" autocomplete="off">
          <button id="search-clear" title="Borrar búsqueda" style="display:none;">
            <i class="codicon codicon-close"></i>
          </button>
        </div>
        <div id="search-summary" class="search-summary"></div>
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
  </aside>

  <div class="sidebar-resizer" id="sidebar-resizer"></div>

  <main class="editor-area">
    <div class="tabs-bar" id="tabs-bar"></div>
    <div class="editor-host-wrapper">
      <div id="editor-host" class="editor-host editor-empty"></div>
      <div class="editor-empty-placeholder" id="editor-empty-placeholder">
        <div class="placeholder-logo">{ }</div>
        <p>Selecciona un archivo para empezar a editar</p>
        <p class="placeholder-hint">
          <kbd>Ctrl</kbd> + <kbd>S</kbd> Guardar &nbsp;&nbsp;
          <kbd>Ctrl</kbd> + <kbd>F</kbd> Buscar &nbsp;&nbsp;
          <kbd>Ctrl</kbd> + <kbd>Q</kbd> Paleta de comandos
        </p>
      </div>
    </div>
  </main>

</div>

<footer class="status-bar" id="status-bar">
  <div class="status-left">
    <span id="status-fs-mode">Modo virtual</span>
    <span id="status-modified-count"></span>
  </div>
  <div class="status-right">
    <span id="status-cursor-pos">Ln 1, Col 1</span>
    <span id="status-language">plaintext</span>
    <span id="status-autosave">Autoguardado: ON</span>
  </div>
</footer>

<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-panel-header">
      <span>Configuración</span>
      <button id="btn-close-settings"><i class="codicon codicon-close"></i></button>
    </div>
    <div class="settings-panel-body">
      <div class="settings-row">
        <label for="cfg-font-size">Tamaño de fuente</label>
        <input type="number" id="cfg-font-size" min="8" max="40" step="1">
      </div>
      <div class="settings-row">
        <label for="cfg-tab-size">Tamaño de tabulación</label>
        <input type="number" id="cfg-tab-size" min="1" max="8" step="1">
      </div>
      <div class="settings-row settings-row-checkbox">
        <label for="cfg-word-wrap">Ajuste de línea (Word Wrap)</label>
        <input type="checkbox" id="cfg-word-wrap">
      </div>
      <div class="settings-row settings-row-checkbox">
        <label for="cfg-minimap">Minimapa</label>
        <input type="checkbox" id="cfg-minimap">
      </div>
      <div class="settings-row settings-row-checkbox">
        <label for="cfg-auto-save">Autoguardado</label>
        <input type="checkbox" id="cfg-auto-save">
      </div>
      <div class="settings-row">
        <label for="cfg-theme">Tema</label>
        <select id="cfg-theme">
          <option value="dark-2026">Dark 2026 (VS Code 2026)</option>
          <option value="dark-modern">Dark Modern</option>
          <option value="dark-plus">Dark+ (Clásico)</option>
          <option value="light-modern">Light Modern</option>
          <option value="light-plus">Light+ (Clásico)</option>
          <option value="monokai">Monokai</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Notificaciones (toasts) abajo a la derecha -->
<div id="notification-container" class="notification-container"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
